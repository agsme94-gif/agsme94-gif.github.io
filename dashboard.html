<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerHouse Bot Manager</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.16);
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9d99;
    --green: #2d8a55;   --green-bg: #eaf5ef;
    --amber: #a06000;   --amber-bg: #fef4e2;
    --red:   #c0392b;   --red-bg:   #fdf0ee;
    --blue:  #1a5fa8;   --blue-bg:  #eaf1fb;
    --purple:#5340b5;   --purple-bg:#f0effe;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --card: #222224;
      --border: rgba(255,255,255,0.08);
      --border-md: rgba(255,255,255,0.15);
      --text: #e8e7e2;
      --text2: #9a9994;
      --text3: #6b6a66;
      --green: #4ec880;   --green-bg: #0f2e1c;
      --amber: #f5b840;   --amber-bg: #2a1e06;
      --red:   #f07060;   --red-bg:   #2a100c;
      --blue:  #6aabf5;   --blue-bg:  #0c1f38;
      --purple:#a090f5;   --purple-bg:#1a1440;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }

  /* ── Layout ── */
  .page { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }
  header { margin-bottom: 24px; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .config-row { display: flex; gap: 8px; margin-bottom: 24px; align-items: stretch; }
  .config-row input { flex: 1; padding: 9px 12px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); background: var(--card); color: var(--text); font-size: 14px; font-family: inherit; }
  .config-row input:focus { outline: 2px solid var(--blue); outline-offset: 1px; }

  /* ── Cards ── */
  .bot-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-icon { width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .card-title { font-size: 16px; font-weight: 600; }
  .card-schedule { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 4px 10px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge-idle       { background: var(--bg); color: var(--text2); border: 1px solid var(--border-md); }
  .badge-dot-idle   { background: var(--text3); }
  .badge-run        { background: var(--green-bg); color: var(--green); }
  .badge-dot-run    { background: var(--green); }
  .badge-manual     { background: var(--blue-bg); color: var(--blue); }
  .badge-dot-manual { background: var(--blue); }
  .badge-term       { background: var(--red-bg); color: var(--red); }
  .badge-dot-term   { background: var(--red); }

  .meta { display: flex; flex-wrap: wrap; gap: 14px; margin: 14px 0; font-size: 13px; color: var(--text2); }
  .meta span { display: flex; align-items: center; gap: 5px; }
  .meta .ok  { color: var(--green); }
  .meta .err { color: var(--red); }
  .mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); color: var(--text); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* ── Buttons ── */
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-md); background: transparent; color: var(--text); font-family: inherit; transition: background 0.12s, opacity 0.12s; }
  .btn:hover:not(:disabled) { background: var(--bg); }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .btn-start  { color: var(--green);  border-color: var(--green); }
  .btn-start:hover:not(:disabled)  { background: var(--green-bg); }
  .btn-stop   { color: var(--amber);  border-color: var(--amber); }
  .btn-stop:hover:not(:disabled)   { background: var(--amber-bg); }
  .btn-term   { color: var(--red);    border-color: var(--red); }
  .btn-term:hover:not(:disabled)   { background: var(--red-bg); }
  .btn-restart{ color: var(--purple); border-color: var(--purple); }
  .btn-restart:hover:not(:disabled){ background: var(--purple-bg); }
  .btn-refresh{ color: var(--blue);   border-color: var(--blue); }
  .btn-refresh:hover:not(:disabled) { background: var(--blue-bg); }

  /* ── Log ── */
  .log-toggle { background: none; border: none; color: var(--text2); font-size: 12px; cursor: pointer; margin-top: 10px; display: flex; align-items: center; gap: 4px; font-family: inherit; padding: 0; }
  .log-toggle:hover { color: var(--text); }
  .log-panel { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 8px; font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; color: var(--text2); max-height: 200px; overflow-y: auto; display: none; }
  .log-panel.open { display: block; }
  .log-ok  { color: var(--green); }
  .log-err { color: var(--red); }
  .log-inf { color: var(--blue); }

  /* ── Toast ── */
  .toast-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 99; pointer-events: none; min-width: 260px; max-width: 340px; }
  .toast { background: var(--card); border: 1px solid var(--border-md); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 13px; opacity: 0; transition: opacity 0.2s; text-align: center; }
  .toast.show { opacity: 1; }
  .toast.err  { border-color: var(--red); color: var(--red); }
  .toast.ok   { border-color: var(--green); color: var(--green); }

  /* ── Setup banner ── */
  .setup-banner { background: var(--amber-bg); border: 1px solid var(--amber); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: var(--amber); margin-bottom: 20px; display: none; }
  .setup-banner.visible { display: block; }

  /* ── Spinner ── */
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -3px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .refresh-row span { font-size: 12px; color: var(--text3); }
</style>
</head>
<body>

<div class="page">
  <header>
    <h1>⚙ Bot control panel</h1>
    <p>PowerHouse Egypt · Google Cloud VM · Cairo time (UTC+3)</p>
  </header>

  <div class="setup-banner" id="setup-banner">
    Enter your API URL and token above, then press Enter or click Refresh.
  </div>

  <div class="config-row">
    <input type="url"      id="api-url"   placeholder="https://your-tunnel.trycloudflare.com" autocomplete="off">
    <input type="password" id="api-token" placeholder="API token" autocomplete="off">
    <button class="btn btn-refresh" onclick="loadAll()">Refresh</button>
  </div>

  <div class="refresh-row">
    <span id="last-refresh">Not loaded yet</span>
    <span id="auto-label" style="font-size:12px; color:var(--text3)">Auto-refresh every 15s</span>
  </div>

  <div id="cards">
    <p style="color:var(--text2); font-size:14px; text-align:center; padding:40px 0;">Enter your API URL and token above, then click Refresh.</p>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const BOTS_META = {
  pm:      { icon: "🔧", iconBg: "#eaf1fb", schedule: "Daily · 10:00 Cairo (07:00 UTC)" },
  downtime:{ icon: "⚠", iconBg: "#fef4e2", schedule: "Hourly (skips 05, 07, 17 UTC)" },
  daily:   { icon: "📊", iconBg: "#eaf5ef", schedule: "Daily · 05:00 Cairo (02:00 UTC)" },
};

let _bots = [];
let _logOpen = {};
let _autoTimer = null;

function apiUrl()   { return document.getElementById("api-url").value.replace(/\/$/, ""); }
function apiToken() { return document.getElementById("api-token").value; }

function headers() {
  return { "Content-Type": "application/json", "Authorization": "Bearer " + apiToken() };
}

async function apiFetch(path, opts = {}) {
  const url = apiUrl() + path;
  if (!apiUrl()) throw new Error("No API URL set.");
  const r = await fetch(url, { ...opts, headers: headers() });
  if (!r.ok) {
    const txt = await r.text().catch(() => "");
    throw new Error(`${r.status} ${r.statusText}: ${txt}`);
  }
  return r.json();
}

function toast(msg, type = "") {
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(() => el.classList.add("show"));
  setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 300); }, 3000);
}

async function loadAll() {
  const banner = document.getElementById("setup-banner");
  if (!apiUrl() || !apiToken()) { banner.classList.add("visible"); return; }
  banner.classList.remove("visible");
  try {
    _bots = await apiFetch("/bots");
    render();
    document.getElementById("last-refresh").textContent = "Updated " + new Date().toLocaleTimeString("en-EG", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  } catch (e) {
    toast("Failed to load: " + e.message, "err");
  }
}

async function action(botId, verb, body) {
  try {
    const r = await apiFetch(`/bots/${botId}/${verb}`, { method: "POST", body: body ? JSON.stringify(body) : undefined });
    toast(r.message, r.ok ? "ok" : "err");
    await loadAll();
  } catch (e) {
    toast("Error: " + e.message, "err");
  }
}

async function loadLog(botId) {
  try {
    const r = await apiFetch(`/bots/${botId}/log?lines=40`);
    return r.lines || [];
  } catch (e) {
    return ["[error loading log: " + e.message + "]"];
  }
}

function classify(line) {
  const l = line.toLowerCase();
  if (l.includes("error") || l.includes("fail") || l.includes("exception")) return "log-err";
  if (l.includes("started") || l.includes("done") || l.includes("success") || l.includes("complete")) return "log-ok";
  if (l.includes("[info]") || l.includes("info")) return "log-inf";
  return "";
}

function statusBadge(s) {
  if (s === "running_cron" || s === "running_manual") {
    const lbl = s === "running_manual" ? "Running (manual)" : "Running (cron)";
    const cls = s === "running_manual" ? "badge-manual badge-dot-manual" : "badge-run badge-dot-run";
    const [bc, dc] = cls.split(" ");
    return `<span class="badge ${bc}"><span class="badge-dot ${dc}"></span>${lbl}</span>`;
  }
  if (s === "terminated") return `<span class="badge badge-term"><span class="badge-dot badge-dot-term"></span>Terminated</span>`;
  return `<span class="badge badge-idle"><span class="badge-dot badge-dot-idle"></span>Idle</span>`;
}

function render() {
  const container = document.getElementById("cards");
  if (!_bots.length) { container.innerHTML = "<p style='color:var(--text2);text-align:center;padding:40px 0'>No bots found.</p>"; return; }
  container.innerHTML = _bots.map(bot => {
    const meta  = BOTS_META[bot.id] || { icon: "🤖", iconBg: "#f0f0f0", schedule: "" };
    const open  = _logOpen[bot.id];
    const running = bot.status === "running_cron" || bot.status === "running_manual";
    const resIcon = bot.last_result === "success" ? "✓" : bot.last_result === "failed" ? "✗" : "–";
    const resCls  = bot.last_result === "success" ? "ok" : bot.last_result === "failed" ? "err" : "";
    return `
<div class="bot-card" id="card-${bot.id}">
  <div class="card-top">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div class="card-icon" style="background:${meta.iconBg}">${meta.icon}</div>
      <div>
        <div class="card-title">${bot.name}</div>
        <div class="card-schedule">🕐 ${meta.schedule}</div>
      </div>
    </div>
    ${statusBadge(bot.status)}
  </div>

  <div class="meta">
    <span>
      <span class="${resCls}">${resIcon}</span>
      Last run: <strong>${bot.last_run || "Never"}</strong>
    </span>
    <span><span class="mono">${bot.id === "pm" ? "PM_Schedule.py" : bot.id === "downtime" ? "Downtime_checker.py" : "powerhouse_daily_report.py"}</span></span>
    ${bot.pids && bot.pids.length ? `<span>PID&nbsp;<strong>${bot.pids.join(", ")}</strong></span>` : ""}
    ${!bot.cron_active ? `<span style="color:var(--red)">⛔ Schedule disabled</span>` : ""}
  </div>

  <hr class="divider">

  <div class="actions">
    <button class="btn btn-start"   ${running ? "disabled" : ""} onclick="action('${bot.id}','start')">▶ Start now</button>
    <button class="btn btn-stop"    ${!running ? "disabled" : ""} onclick="action('${bot.id}','stop')">⏹ Stop</button>
    <button class="btn btn-term"    ${bot.status==="terminated" ? "disabled" : ""} onclick="confirmTerminate('${bot.id}')">✕ Terminate</button>
    ${bot.status === "terminated"
      ? `<button class="btn btn-restart" onclick="action('${bot.id}','restart',{run_now:false})">↺ Re-enable schedule</button>`
      : ""}
  </div>

  <button class="log-toggle" onclick="toggleLog('${bot.id}')">
    ${open ? "▾ hide log" : "▸ show log"}
  </button>
  <div class="log-panel${open ? " open" : ""}" id="log-${bot.id}">
    ${open ? "<span style='color:var(--text3)'>Loading…</span>" : ""}
  </div>
</div>`;
  }).join("");

  // Re-populate open logs
  Object.entries(_logOpen).forEach(([bid, open]) => {
    if (open) _fillLog(bid);
  });
}

async function _fillLog(botId) {
  const el = document.getElementById("log-" + botId);
  if (!el) return;
  const lines = await loadLog(botId);
  el.innerHTML = lines.map(l =>
    `<div class="${classify(l)}">${l.replace(/</g,"&lt;")}</div>`
  ).join("") || "<span style='color:var(--text3)'>No log lines found.</span>";
  el.scrollTop = el.scrollHeight;
}

async function toggleLog(botId) {
  _logOpen[botId] = !_logOpen[botId];
  render();
  if (_logOpen[botId]) await _fillLog(botId);
}

function confirmTerminate(botId) {
  const name = _bots.find(b => b.id === botId)?.name || botId;
  if (confirm(`Terminate "${name}"?\n\nThis will kill any running process AND disable the cron schedule. Use Re-enable to restore.`)) {
    action(botId, "terminate");
  }
}

// Auto-refresh
function startAutoRefresh() {
  if (_autoTimer) clearInterval(_autoTimer);
  _autoTimer = setInterval(loadAll, 15000);
}

// Save/restore config from localStorage
window.addEventListener("DOMContentLoaded", () => {
  const savedUrl   = localStorage.getItem("ph_api_url");
  const savedToken = localStorage.getItem("ph_api_token");
  if (savedUrl)   document.getElementById("api-url").value   = savedUrl;
  if (savedToken) document.getElementById("api-token").value = savedToken;
  if (savedUrl && savedToken) loadAll();
  else document.getElementById("setup-banner").classList.add("visible");

  document.getElementById("api-url").addEventListener("change", () => {
    localStorage.setItem("ph_api_url", document.getElementById("api-url").value);
  });
  document.getElementById("api-token").addEventListener("change", () => {
    localStorage.setItem("ph_api_token", document.getElementById("api-token").value);
  });
  ["api-url","api-token"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") loadAll(); });
  });

  startAutoRefresh();
});
</script>
</body>
</html>
